limit_req_zone $binary_remote_addr zone=xianyuplus_api:10m rate=20r/s;

map $http_upgrade $xianyuplus_connection_upgrade {
    default upgrade;
    '' close;
}

upstream xianyuplus_app {
    server 127.0.0.1:12400;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location / {
        # 对公网请求限流，避免突发流量耗尽单机资源。
        limit_req zone=xianyuplus_api burst=40 nodelay;
        proxy_pass http://xianyuplus_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 单层代理覆盖客户端伪造的转发头，保证登录限流使用真实来源地址。
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $xianyuplus_connection_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}
