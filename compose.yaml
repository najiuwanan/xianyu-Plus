name: xianyusmart

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-xianyusmart}
      MYSQL_USER: ${DB_USERNAME:-xianyusmart}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --max-connections=100
    volumes:
      - mysql-data:/var/lib/mysql
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - xianyusmart

  app:
    build:
      context: .
      args:
        APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
    image: ${APP_IMAGE:-xianyusmart:latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-xianyusmart}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
      DB_USERNAME: ${DB_USERNAME:-xianyusmart}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-28800000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:12400}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-2}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=65 -XX:InitialRAMPercentage=20 -XX:+ExitOnOutOfMemoryError}
      TZ: ${TZ:-Asia/Shanghai}
      UPDATE_GITHUB_REPOSITORY: ${UPDATE_GITHUB_REPOSITORY:-najiuwanan/xianyu-Plus}
      UPDATE_CHECK_CACHE_MINUTES: ${UPDATE_CHECK_CACHE_MINUTES:-60}
    ports:
      - "12400:12400"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:12400/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - xianyusmart

  nginx:
    image: nginx:1.27-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - xianyusmart

volumes:
  mysql-data:
  app-data:
  app-logs:

networks:
  xianyusmart:
    driver: bridge
