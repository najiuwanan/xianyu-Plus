name: xianyu-plus

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-xianyusmart}
      MYSQL_USER: ${DB_USERNAME:-xianyusmart}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --max-connections=100
    volumes:
      - mysql-data:/var/lib/mysql
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - xianyu-plus

  app:
    build:
      context: .
      args:
        APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
    image: ${APP_IMAGE:-xianyu-plus:latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-xianyusmart}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
      DB_USERNAME: ${DB_USERNAME:-xianyusmart}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-28800000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:12400}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-2}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=65 -XX:InitialRAMPercentage=20 -XX:+ExitOnOutOfMemoryError}
      TZ: ${TZ:-Asia/Shanghai}
      UPDATE_GITHUB_REPOSITORY: ${UPDATE_GITHUB_REPOSITORY:-najiuwanan/xianyu-Plus}
      UPDATE_CHECK_CACHE_MINUTES: ${UPDATE_CHECK_CACHE_MINUTES:-60}
      ONLINE_UPDATE_ENABLED: ${ONLINE_UPDATE_ENABLED:-true}
      ONLINE_UPDATE_CONTROL_DIR: /app/data/update
    ports:
      - "12400:12400"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:12400/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - xianyu-plus

  updater:
    build:
      context: .
      dockerfile: deploy/updater/Dockerfile
    image: ${UPDATER_IMAGE:-xianyu-plus-updater:latest}
    restart: unless-stopped
    working_dir: ${HOST_PROJECT_DIR:-/workspace}
    environment:
      HOME: /tmp
      UPDATE_WORKSPACE: ${HOST_PROJECT_DIR:-/workspace}
      UPDATE_CONTROL_ROOT: /control/update
      ONLINE_UPDATE_BRANCH: ${ONLINE_UPDATE_BRANCH:-main}
      ONLINE_UPDATE_DOWNTIME_SECONDS: ${ONLINE_UPDATE_DOWNTIME_SECONDS:-120}
      APP_IMAGE: ${APP_IMAGE:-xianyu-plus:latest}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${HOST_PROJECT_DIR:-.}:${HOST_PROJECT_DIR:-/workspace}
      - app-data:/control
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - xianyu-plus

  nginx:
    image: nginx:1.27-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - xianyu-plus

volumes:
  mysql-data:
    name: ${MYSQL_DATA_VOLUME:-xianyu-plus-mysql-data}
  app-data:
    name: ${APP_DATA_VOLUME:-xianyu-plus-app-data}
  app-logs:
    name: ${APP_LOGS_VOLUME:-xianyu-plus-app-logs}

networks:
  xianyu-plus:
    name: ${APP_NETWORK_NAME:-xianyu-plus}
    driver: bridge
